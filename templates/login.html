<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Transcriptor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 1.8rem;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-card input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .error {
            color: #ff4757;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <form class="login-card" method="POST">
        <h1>Transcriptor</h1>
        <p>Ingresa la clave para continuar</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <input type="password" name="password" placeholder="Clave de acceso" autofocus>
        <button type="submit">Entrar</button>
    </form>
</body>
</html>
